<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Factory Dashboard</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div class="container">
        <h1>Smart Factory Dashboard</h1>
        <p class="subtitle">Live Sensor Data </p>

        <div class="summary-grid">
            <div class="summary-card">
                <h3>Total Records</h3>
                <p id="totalCount">0</p>
            </div>
            <div class="summary-card normal-card">
                <h3>Normal</h3>
                <p id="normalCount">0</p>
            </div>
            <div class="summary-card warning-card">
                <h3>Warning</h3>
                <p id="warningCount">0</p>
            </div>
            <div class="summary-card critical-card">
                <h3>Critical</h3>
                <p id="criticalCount">0</p>
            </div>
        </div>

        <h2>Machine Status Overview</h2>
        <div id="machineCards" class="machine-grid">
            <p>Loading machine cards...</p>
        </div>

        <h2>Recent Records</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Machine ID</th>
                        <th>Temperature</th>
                        <th>Vibration</th>
                        <th>Status</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="sensorTableBody">
                    <tr>
                        <td colspan="5">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/index.js"></script>
</body>
</html>
